<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick Date & Time</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);background-size:300% 300%;animation:bgMove 12s ease infinite;text-align:center;padding-top:40px;}
@keyframes bgMove{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
h1{font-family:'Cormorant Garamond', serif;font-size:52px;color:white;margin-bottom:20px;text-shadow:0 15px 30px rgba(0,0,0,0.15);}
p{font-size:20px;margin:20px 0;color:white;text-shadow:0 2px 4px rgba(0,0,0,0.2);}
label{display:block;font-size:18px;margin-top:20px;color:white;text-shadow:0 2px 4px rgba(0,0,0,0.2);}
input{padding:10px;font-size:16px;margin-top:5px;border-radius:8px;border:1px solid #ccc;}
button{font-family:'Montserrat',sans-serif;background-color:#ff4d6d;color:white;border:none;border-radius:10px;padding:15px 30px;font-size:18px;margin:20px 10px 0 10px;cursor:pointer;transition:0.3s;}
button:hover{background-color:#ff85c1;}
</style>
</head>
<body>

<h1>Pick Your Date & Time</h1>
<p id="locationText"></p>

<label for="date">Select Date:</label>
<input type="date" id="date">
<label for="time">Select Time:</label>
<input type="time" id="time">

<div>
  <button onclick="goBack()">Back</button>
  <button onclick="confirmDate()">Confirm</button>
</div>

<script>
const selectedLocationObj = JSON.parse(localStorage.getItem("specificLocation"));
if(!selectedLocationObj) window.location.href="specific.html";
document.getElementById("locationText").textContent="Location: "+selectedLocationObj.name;
function goBack(){ window.location.href="specific.html"; }
function confirmDate(){
  const date=document.getElementById("date").value;
  const time=document.getElementById("time").value;
  if(!date||!time){ alert("Please select both date and time."); return; }
  const dateData={location:selectedLocationObj.name,img:selectedLocationObj.img,date:date,time:time};
  localStorage.setItem("dateConfirmation",JSON.stringify(dateData));
  window.location.href="confirmation.html";
}
</script>
</body>
</html>
