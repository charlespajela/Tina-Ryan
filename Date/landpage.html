<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Bal 💌</title>

<!-- Premium Romantic Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Montserrat', sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
  background-size:300% 300%;
  animation:bgMove 10s ease infinite;
  overflow:hidden;
  text-align:center;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Title Styling */
h1{
  font-family:'Cormorant Garamond', serif;
  font-size:64px;
  font-weight:700;
  color:white;
  letter-spacing:3px;
  margin-bottom:15px;
  animation:fadeInDown 1.2s ease;
  text-shadow:0 10px 25px rgba(0,0,0,0.15);
}

@keyframes fadeInDown{
  from{opacity:0; transform:translateY(-40px);}
  to{opacity:1; transform:translateY(0);}
}

.subtitle{
  color:white;
  font-weight:300;
  letter-spacing:2px;
  margin-bottom:40px;
  opacity:0.9;
}

/* Envelope Container */
.envelope-container{
  position:relative;
  width:280px;
  height:190px;
  margin:auto;
  cursor:pointer;
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-18px);}
}

/* Envelope Base */
.envelope{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(145deg,#ffffff,#f8f8f8);
  border-radius:12px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  overflow:hidden;
}

/* Inner Letter (hidden initially) */
.letter{
  position:absolute;
  width:90%;
  height:80%;
  background:white;
  top:20%;
  left:5%;
  border-radius:8px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Cormorant Garamond', serif;
  font-size:22px;
  color:#ff4d6d;
  transform:translateY(40px);
  transition:0.8s ease;
}

/* Flap */
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#ff4d6d,#ff758c);
  clip-path:polygon(0 0, 50% 65%, 100% 0);
  transform-origin:top;
  transition:0.8s ease;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* Bottom Fold */
.envelope::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#ff4d6d,#ff758c);
  clip-path:polygon(0 100%,50% 55%,100% 100%);
}

/* Hover Interaction */
.envelope-container:hover .flap{
  transform:rotateX(180deg);
}

.envelope-container:hover .letter{
  transform:translateY(-10px);
}

/* Click Text */
.click-text{
  color:white;
  margin-top:30px;
  font-size:16px;
  letter-spacing:2px;
  opacity:0.8;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{opacity:0.6;}
  50%{opacity:1;}
  100%{opacity:0.6;}
}

/* Floating Hearts */
.heart{
  position:fixed;
  bottom:-20px;
  font-size:18px;
  animation:rise linear infinite;
  opacity:0.6;
}

@keyframes rise{
  from{transform:translateY(0) rotate(0deg);}
  to{transform:translateY(-120vh) rotate(360deg);}
}
</style>
</head>

<body>

<div>
  <h1>For You, Bal</h1>
  <div class="subtitle">A little surprise just for you </div>

  <div class="envelope-container" onclick="openLetter()">
      <div class="envelope">
          <div class="letter">Open Me </div>
          <div class="flap"></div>
      </div>
  </div>

  <div class="click-text">Click the envelope to open </div>
</div>

<script>
function openLetter(){
  document.querySelector(".flap").style.transform="rotateX(180deg)";
  document.querySelector(".letter").style.transform="translateY(-20px)";
  
  setTimeout(()=>{
    window.location.href="question.html";
  },900);
}

/* Floating hearts */
function createHeart(){
  const heart=document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*15+15)+"px";
  heart.style.animationDuration=(Math.random()*4+5)+"s";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),9000);
}
setInterval(createHeart,700);
</script>

</body>
</html>
