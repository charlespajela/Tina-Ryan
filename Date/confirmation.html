<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
  background-size:300% 300%;
  animation:bgMove 12s ease infinite;
  text-align:center;
  padding:40px 20px;
  min-height:100vh;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Card Style */
.card{
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(12px);
  width:350px;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 12px 35px rgba(0,0,0,0.2);
  display:inline-block;
  text-align:left;
  margin-bottom:30px;
  padding:20px;
  transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover{
  transform: translateY(-8px);
  box-shadow:0 18px 45px rgba(0,0,0,0.25);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:15px;
  margin-bottom:15px;
}

.card h3{
  color:#ff4d6d;
  font-size:24px;
  margin-bottom:15px;
  text-align:center;
}

.card .category{
  font-weight:600;
  margin-top:10px;
  color:#555;
}

.card .value{
  font-size:18px;
  margin-top:3px;
  color:#333;
}

/* Sweet message inside card */
.card .sweet-msg{
  background-color:#ffe0e8;
  border-radius:15px;
  padding:15px;
  margin-top:20px;
  font-size:16px;
  color:#ff4d6d;
  text-align:center;
  line-height:1.5;
  font-style:italic;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* Buttons */
button{
  font-family:'Montserrat',sans-serif;
  background-color:#ff4d6d;
  color:white;
  border:none;
  border-radius:12px;
  padding:15px 35px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
  margin-top:15px;
}

button:hover{
  background-color:#ff85c1;
}
</style>
</head>
<body>

<div class="card" id="detailsCard">
  <img id="locationImg" src="" alt="">

  <div class="category">Place:</div>
  <div class="value" id="locationName"></div>

  <div class="category">Date:</div>
  <div class="value" id="dateText"></div>

  <div class="category">Time:</div>
  <div class="value" id="timeText"></div>

  <div class="sweet-msg">
    I’m so excited for our special moment! Don’t forget to take a screenshot or snap a picture of this card and send it to me. 
  </div>
</div>


<script>
const storedData = JSON.parse(localStorage.getItem("dateConfirmation"));
if(!storedData) window.location.href="datetime.html";

const formattedDate = new Date(storedData.date).toLocaleDateString('en-US',{
  year:'numeric',
  month:'long',
  day:'numeric'
});

const [hours, minutes] = storedData.time.split(":");
const formattedTime = new Date(0,0,0,hours,minutes).toLocaleTimeString('en-US',{
  hour:'numeric',
  minute:'2-digit',
  hour12:true
});

// Set values
document.getElementById("locationImg").src = storedData.img;
document.getElementById("locationName").textContent = storedData.location;
document.getElementById("dateText").textContent = formattedDate;
document.getElementById("timeText").textContent = formattedTime;

function goBack(){
  window.location.href = "datetime.html";
}
</script>

</body>
</html>
